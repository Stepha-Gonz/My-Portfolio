[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — React Router needs this
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
